# ──────────────────────────────────────────────
# GLOBAL CONSUMABLES
# All specs have consumables_weight: 0.00 by default (informational only).
# To score consumables for a spec, raise consumables_weight and lower parse_weight
# by the same amount so all three weights still sum to 1.0.
# optional: true = shown in display but NEVER included in the score
# (used for profession-gated items or situational consumables)
# ──────────────────────────────────────────────

consumables:
  - metric: flask_or_elixir
    label: "Flask / Elixirs"
    type: combo_presence
    flask_ids: [17628, 17627, 28518, 28520, 28521, 28540, 33053]
    battle_elixir_ids: [28490, 28491, 28493, 28494, 28497, 17538, 17539, 28543]
    guardian_elixir_ids: [39625, 39627, 39628, 28502, 28503]
    target: 100

  - metric: haste_potion_count
    label: "Haste Potion"
    spell_id: 28507
    type: count
    target: 2

  - metric: destruction_potion_count
    label: "Destruction Potion"
    spell_id: 28508
    type: count
    target: 2

  - metric: mana_potion_count
    label: "Mana Potion"
    spell_id: 28499
    type: count
    target: 2

  - metric: dark_rune_count
    label: "Dark Rune"
    spell_id: 27869
    type: count
    target: 2
    optional: true

  - metric: demonic_rune_count
    label: "Demonic Rune"
    spell_id: 12662
    type: count
    target: 2
    optional: true

  - metric: drums_count
    label: "Drums"
    spell_ids: [35476, 35475, 35478, 35477]
    type: count
    target: 4
    optional: true

  - metric: sapper_count
    label: "Goblin Sapper"
    spell_id: 13241
    type: count
    target: 2
    optional: true

  - metric: grenade_count
    label: "Grenade / Bomb"
    spell_ids: [30216, 30217, 19769]
    type: count
    target: 3
    optional: true

# ──────────────────────────────────────────────
# EXCLUDED ZONES
# Reports from these zones are still synced and visible on the website,
# but they do NOT count towards leaderboards, player scores, MVP,
# weekly top performers, insights, trends, attendance, or any aggregates.
# ──────────────────────────────────────────────

excluded_zones:
  - 1047   # Karazhan

# ──────────────────────────────────────────────
# ATTENDANCE REQUIREMENTS
# Officers can add/remove zones as the guild progresses.
# required_per_week: how many clears of this zone are expected per week.
# Use /setattendance in Discord to manage, or edit this file directly.
# ──────────────────────────────────────────────

attendance:
  - zone_id: 1047
    label: "Karazhan"
    required_per_week: 1
  - zone_id: 1048
    label: "Gruul/Magtheridon"
    required_per_week: 1

# ──────────────────────────────────────────────
# GEAR CHECK
# Flag raiders with subpar gear in reports.
# min_avg_ilvl: average item level floor
# min_quality: minimum acceptable quality (2=green, 3=blue, 4=epic)
# check_enchants/check_gems: toggle enchant/gem validation
# enchant_slots: WoW slot IDs that should be enchanted
# ──────────────────────────────────────────────

gear_check:
  min_avg_ilvl: 100
  min_quality: 3
  check_enchants: true
  check_gems: true
  enchant_slots: [0, 2, 4, 6, 7, 8, 9, 14, 15]
