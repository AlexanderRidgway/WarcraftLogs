# ──────────────────────────────────────────────
# GLOBAL CONSUMABLES
# All specs have consumables_weight: 0.00 by default (informational only).
# To score consumables for a spec, raise consumables_weight and lower parse_weight
# by the same amount so all three weights still sum to 1.0.
# optional: true = shown in display but NEVER included in the score
# (used for profession-gated items or situational consumables)
# ──────────────────────────────────────────────

consumables:
  - metric: flask_or_elixir
    label: "Flask / Elixirs"
    type: combo_presence
    flask_ids: [17628, 17627, 28518, 28520, 28521, 28540, 33053]
    battle_elixir_ids: [28490, 28491, 28493, 28494, 28497, 17538, 17539, 28543]
    guardian_elixir_ids: [39625, 39627, 39628, 28502, 28503]
    target: 100

  - metric: haste_potion_count
    label: "Haste Potion"
    spell_id: 28507
    type: count
    target: 2

  - metric: destruction_potion_count
    label: "Destruction Potion"
    spell_id: 28508
    type: count
    target: 2

  - metric: mana_potion_count
    label: "Mana Potion"
    spell_id: 28499
    type: count
    target: 2

  - metric: dark_rune_count
    label: "Dark Rune"
    spell_id: 27869
    type: count
    target: 2
    optional: true

  - metric: demonic_rune_count
    label: "Demonic Rune"
    spell_id: 12662
    type: count
    target: 2
    optional: true

  - metric: drums_count
    label: "Drums"
    spell_ids: [35476, 35475, 35478, 35477]
    type: count
    target: 4
    optional: true

  - metric: sapper_count
