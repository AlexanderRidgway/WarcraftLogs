# Class:Spec profiles for scoring raiders.
# utility_weight + parse_weight + consumables_weight must equal 1.0
# consumables_weight: 0.00 = consumables shown as informational only (never scored)
# metric types: "uptime" (% of fight), "count" (number of casts/uses),
#   "relative" (peer-share of casts), "shared_responsibility" (class-wide buff/debuff),
#   "pull_check" (cast in first N seconds of boss pull)
# subtype: "buff" queries WCL Buffs table; omit for Debuffs table
# responsible_class: for shared_responsibility, which class is accountable
# spell_id: single WCL spell ID; spell_ids: list of IDs (matches any one)
# optional: true = shown in display but never included in score

# ──────────────────────────────────────────────
# WARRIOR
# ──────────────────────────────────────────────

warrior:protection:
  utility_weight: 0.75
  parse_weight: 0.25
  consumables_weight: 0.00
  contributions:
    - metric: sunder_armor_uptime
      label: "Sunder Armor"
      spell_id: 7386
      type: uptime
      target: 90
    - metric: demoralizing_shout_uptime
      label: "Demo Shout"
      spell_id: 25203
      type: uptime
      target: 85
    - metric: thunderclap_count
      label: "Thunderclap"
      spell_id: 6343
      type: count
      target: 15

