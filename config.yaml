# ──────────────────────────────────────────────
# ATTENDANCE REQUIREMENTS
# Officers can add/remove zones as the guild progresses.
# required_per_week: how many clears of this zone are expected per week.
# Use /setattendance in Discord to manage, or edit this file directly.
# ──────────────────────────────────────────────

attendance:
  - zone_id: 1047
    label: "Karazhan"
    required_per_week: 1
  - zone_id: 1048
    label: "Gruul/Magtheridon"
    required_per_week: 1

# ──────────────────────────────────────────────
# GEAR CHECK
# Flag raiders with subpar gear in reports.
# min_avg_ilvl: average item level floor
# min_quality: minimum acceptable quality (2=green, 3=blue, 4=epic)
# check_enchants/check_gems: toggle enchant/gem validation
# enchant_slots: WoW slot IDs that should be enchanted
# ──────────────────────────────────────────────

gear_check:
  min_avg_ilvl: 100
  min_quality: 3
  check_enchants: true
  check_gems: true
  enchant_slots: [0, 2, 4, 6, 7, 8, 9, 14, 15]
